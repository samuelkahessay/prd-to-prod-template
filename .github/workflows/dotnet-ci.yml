name: .NET CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check-profile:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .deploy-profile
          sparse-checkout-cone-mode: false
      - id: check
        run: |
          PROFILE=$(cat .deploy-profile 2>/dev/null || echo "dotnet-azure")
          if [[ "$PROFILE" == "dotnet-azure" ]]; then
            echo "should-run=true" >> $GITHUB_OUTPUT
          else
            echo "should-run=false" >> $GITHUB_OUTPUT
            echo "Skipping .NET CI — active profile is '${PROFILE}'"
          fi

  build-and-test:
    needs: check-profile
    if: needs.check-profile.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Find solution file
        id: sln
        run: |
          SOLUTION=$(find . -maxdepth 1 -name '*.sln' | head -1)
          if [ -z "$SOLUTION" ]; then
            echo "::error::No .sln file found in repo root"
            exit 1
          fi
          echo "file=${SOLUTION}" >> $GITHUB_OUTPUT
      - run: dotnet restore ${{ steps.sln.outputs.file }}
      - run: dotnet build ${{ steps.sln.outputs.file }} --no-restore
      - run: dotnet test ${{ steps.sln.outputs.file }} --no-build --verbosity normal
