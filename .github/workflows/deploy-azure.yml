#
# Deploy to Azure — Reusable Azure deployment workflow invoked by Deploy Router
# after a push lands on main, or manually via workflow_dispatch for debugging.
#
# Flow:
#   1. Deploy Router selects the dotnet-azure profile for the current main commit
#   2. Restore, build, test, and publish the .NET app in Release configuration
#   3. Log in to Azure via service principal, then deploy the published output
#
# Prerequisites:
#   - AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID secrets
#   - Federated identity credential on the service principal for this repo
#     (subject: repo:OWNER/REPO:ref:refs/heads/main)
#
# Safety:
#   - Concurrency group ensures only one deploy runs at a time; newer pushes
#     cancel in-progress deploys (safe because we always deploy HEAD of main)
#

name: Deploy to Azure

on:
  workflow_call:
  workflow_dispatch:  # manual trigger for testing/debugging

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-azure
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore, build, test, and publish
        run: |
          SOLUTION=$(find . -maxdepth 1 -name '*.sln' | head -1)
          if [ -z "$SOLUTION" ]; then
            echo "::error::No .sln file found in repo root"
            exit 1
          fi
          dotnet restore "$SOLUTION"
          dotnet build "$SOLUTION" --no-restore -c Release
          dotnet test "$SOLUTION" --no-build -c Release --verbosity normal
          MAIN_PROJECT=$(find . -name '*.csproj' -not -path '*.Tests*' | head -1)
          dotnet publish "$MAIN_PROJECT" --no-build -c Release -o ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        run: |
          cd publish && zip -qr ../deploy.zip . && cd ..
          az webapp config appsettings set \
            --name ${{ vars.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --settings WEBSITE_RUN_FROM_PACKAGE=1 \
            --output none
          az webapp deploy \
            --name ${{ vars.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --src-path deploy.zip \
            --type zip \
            --clean true
